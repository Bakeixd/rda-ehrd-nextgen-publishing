<!-- modal -->
<section id="enroll" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-enroll">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- modal title -->
			<div class="modal-header">
				<h2 id="tit-enroll" class="modal-title"></h2>
			</div>
			<!-- //modal title -->

			<!-- modal contents -->
			<div class="modal-conts">
				<!--<h3 class="conts-tit">내용 타이틀</h3>-->

				<div class="conts-area step-area">
					<!-- 스텝 -->
					<section>
						<div class="int-sign-con int-sign-02">
              <div class="int-sign-text-wrap">
                <p class="int-sign-info-wait"><strong>홍길동</strong> 님의 계정을 통합중입니다.</p>
                <p class="int-sign-info-wait2">잠시만 기다려주세요...</p>
              </div>
              <div class="int-sign-process-bar-container">
                <div class="int-sign-progress-bar-wrap">
                  <div class="int-sign-progress-container">
                    <div class="int-sign-progress-bar" style="width:0%"></div>
                    <img src="../images/login/int-process.png" alt="진행도표시" class="int-sign-icon">
                  </div>
                  <div class="int-progress-text">
                    <p class="int-percentage">0%</p>
                    <p class="int-status">열심히 달려가고 있어요!</p>
                  </div>
                </div>
              </div>
              <div class="int-sign-acount-wrap">
                <p class="int-sign-acount-tit"><strong>gildong01</strong> 계정으로 통합하고 있는 계정은 아래와 같습니다.</p>
                <ul class="int-sign-acount">
                  <li>gildong01</li>
                  <li>gildong02</li>
                  <li>gildong03</li>
                </ul>
              </div>
							
						</div>
					</section>
				</div>
      </div>

			<!-- //modal contents -->
			<!-- modal btn -->
			<div class="modal-btn btn-wrap">
				<button type="button" class="btn btn-darkgray-w int-sign-later-btn">취소</button>
			</div>
			<!-- //modal btn -->
			<!-- close button -->
			<button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
			<!-- //close button -->
		</div>
	</div>
	<div class="modal-back in"></div>
</section>
<!-- //modal -->






<!-- 스크립트 : 라이브러리 -->
<script src="../js/swiper-bundle.min.js"></script>
<script type="text/javascript" src="../js/common.js"></script>
<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

/*프로그레스바*/
  let progress = 0;
    const progressBar = document.querySelector('.int-sign-progress-bar');
    const percentageText = document.querySelector('.int-percentage');
    const statusText = document.querySelector('.int-status');
    const signIcon = document.querySelector('.int-sign-icon');

    function updateProgress() {
        if (progress <= 100) {

            progressBar.style.width = progress + '%';
            percentageText.textContent = progress + '%';
            signIcon.style.left = (progress - 6) + '%';

            if (progress === 0) {
                statusText.textContent = '열심히 달려가고 있어요!';
            } else if (progress === 40) {
                statusText.textContent = '벌써 중간까지 왔자나?!';
            } else if (progress === 80) {
                statusText.textContent = '끝이보인다!';
            } else if (progress === 100) {
                statusText.textContent = '';
            }

            progress += 1;
            setTimeout(updateProgress, 100); 
        }
    }

    updateProgress();



</script>

</body>
