<!-- modal -->
<section id="enroll" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-enroll">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- modal title -->
			<div class="modal-header">
				<h2 id="tit-enroll" class="modal-title"></h2>
			</div>
			<!-- //modal title -->

                            </div>
                          </div>
                        </div> 
                    
                      </section>



				</div>
      </div>

			<!-- //modal contents -->
			<!-- modal btn -->
			<div class="modal-btn btn-wrap">

			</div>
			<!-- //modal btn -->
			<!-- close button -->
			<button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>

		</div>
	</div>
