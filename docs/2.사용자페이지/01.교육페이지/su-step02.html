<!-- modal -->
<section id="sch-detail" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-sch-detail">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- modal title -->
			<div class="modal-header">
				<h2 id="tit-sch-detail" class="modal-title">기수선택</h2>
			</div>
			<!-- //modal title -->

			<!-- modal contents -->
			<div class="modal-conts">
				<!--<h3 class="conts-tit">내용 타이틀</h3>-->

				<div class="conts-area step-area">
					<!-- 스텝 -->
					<ol class="step-wrap">
						<li class="done">
							<span>
								<i class="step">1단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="active">
							<span>
								<i class="step">2단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="">
							<span>
								<i class="step">3단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="">
							<span>
								<em class="none">현재단계</em>
								<i class="step">4단계</i>
									<span class="step-tit">단계 레이블</span>
							</span>
						</li>
					</ol>
					<!-- //스텝 -->
					<div class="agree-area">
						<div class="terms-agree-all">
							<div class="form-check">
								<input type="checkbox" id="check-agree-all">
								<label for="check-agree-all">전체 동의하기</label>
							</div>
							<p class="conts-desc">아래 개인정보수집 및 이용동의 / 개인정보 제 3자 제공동의 /

							</p>
						</div>
					</div>
					<div class="garee-ul-area">
						<ul class="terms-agree-ul">
							<li>
								<h4 class="agree-tit">개인정보 수집 및 이용동의</h4>
								<div class="agree-box">
									<span class="txt">민감정보 수집 및 이용에 대한 안내 사항을 읽고 동의합니다.</span>
								</div>
								<div class="chk-area">
									<div class="form-check">
										<input type="radio" name="terms_rdo1" id="terms_rdo1-1">
										<label for="terms_rdo1-1">동의안함</label>
									</div>
									<div class="form-check">
										<input type="radio" name="terms_rdo1" id="terms_rdo1-2">

								</div>
							</li>
							<li>

								</div>
								<div class="chk-area">
									<div class="form-check">
										<input type="radio" name="terms_rdo1" id="terms_rdo1-1">
										<label for="terms_rdo1-1">동의안함</label>
									</div>

										<input type="radio" name="terms_rdo1" id="terms_rdo1-2">
										<label for="terms_rdo1-2">동의함</label>

							</li>

				<button type="button" class="btn btn-darkgray-w">신청취소</button>
				<button type="button" class="btn btn-secondary">이전</button>
				<button type="button" class="btn btn-primary close-modal">다음</button>
			</div>
			<!-- //modal btn -->
			<!-- close button -->
			<button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
