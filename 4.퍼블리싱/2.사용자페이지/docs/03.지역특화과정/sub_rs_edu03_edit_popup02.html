<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="../css/swiper-bundle.min.css" rel="stylesheet" type="text/css">
  <link href="../css/reset.css" rel="stylesheet" type="text/css">
  <link href="../css/edu-sub.css" rel="stylesheet" type="text/css">
  <link href="../css/component.css" rel="stylesheet" type="text/css">
  <link href="../css/modal.css" rel="stylesheet" type="text/css">
  <link href="../css/font.css" rel="stylesheet" type="text/css">
  <link href="../css/rs_index.css" rel="stylesheet" type="text/css">


  <title>현장실습보고서>향후 계획 및 시사점 [의견등록]</title>

</head>

<body>
  <!--style에 적용되어있는건 화면적용할 때 삭제해주세요-->
  <style>
    body {
      background: #eee;
    }

    .modal {
      display: block;
      visibility: visible;
      opacity: 1;
    }
  </style>

  <!-- modal -->
  <section id="rs-report-feedback" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-enroll">
    <div class="modal-dialog">
      <div class="modal-content ">
        <!-- modal title -->
        <div class="modal-header">
          <div class="lrn-title-tooltip">
            <h2>의견등록</h2>
            <button type="button" class="btn-tooltip right-tooltip"
              data-tooltip="선도농업인. 연수생 각 최대 1.500Byte까지 입력이 가능합니다.">
              <i class="i-tooltip"></i>
            </button>
          </div>
        </div>
        <!-- //modal title -->

        <!-- modal contents -->
        <div class="modal-conts">
          <!--<h3 class="conts-tit">내용 타이틀</h3>-->

          <div class="conts-area">

            <div class="rs-modal-input-box-wrap">
              <div class="form-group">
                <div class="form-tit">
                  선도농업인 (홍길동)&nbsp;<span style="font-size:1.5rem; font-weight: 400;">님의 의견</span>
                </div>
                <div class="form-conts ">
                  <textarea type="text" class="form-control sm" disabled placeholder=""></textarea>
                  <span class="textarea-count">
                    <span class="text-num">0</span>/1500byte
                  </span>
                </div>
              </div>
            </div>

            <div class="rs-modal-input-box-wrap">
              <div class=" form-group">
              <div class="form-tit">
                연수생 (김철수)&nbsp;<span style="font-size:1.5rem; font-weight: 400">님의 의견</span>
              </div>
              <div class="form-conts ">
                <textarea type="text" class="form-control lg" placeholder=""></textarea>
                <span class="textarea-count">
                  <span class="text-num">0</span>/1500byte
                </span>
              </div>
            </div>
          </div>





        </div>


      </div>
      <!-- //modal contents -->
      <!-- modal btn -->
      <div class="modal-btn btn-wrap">
        <button type="button" class="btn btn-darkgray-w n">닫기</button>
        <button type="button" class="btn btn-primary rcs-register-btn">등록하기</button>
      </div>
      <!-- //modal btn -->
      <!-- close button -->
      <button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
      <!-- //close button -->
    </div>
    </div>
    <div class="modal-back"></div>
  </section>
  <!-- //modal -->
  <!-- toast popup -->
  <div class="t-popup-info-wrap sucsess" style="display: none;">
    <div class="t-popup-info">
      <img src="../images/main-page/i_info_sucess.png" alt="정보">
      <p>등록되었습니다. </p>
    </div>
  </div>

  <div class="t-popup-info-wrap sucsess" style="display: none;">
    <div class="t-popup-info">
      <img src="../images/main-page/i_info_sucess.png" alt="정보">
      <p>수정되었습니다. </p>
    </div>
  </div>

  <!-- toast popup -->






  <!-- 스크립트 : 라이브러리 -->
  <script src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/common.js"></script>
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    // 토스트 팝업 표시 함수
    function showToastPopup() {
      const popupInfoWrap = document.querySelector('.t-popup-info-wrap');
      popupInfoWrap.style.display = 'block'; // 토스트 팝업 보이기

      // 3초 후에 토스트 팝업 숨기기
      setTimeout(function () {
        popupInfoWrap.style.display = 'none';
      }, 3000);
    }

    // 등록하기 누르면 나오는 토스트 팝업
    document.querySelectorAll('.rcs-register-btn').forEach(item => {
      item.addEventListener('click', function () {
        item.classList.toggle('selected');
      });
    });

    document.querySelector('.rcs-register-btn').addEventListener('click', function () {
      const popupInfoWrap = document.querySelector('.t-popup-info-wrap');

      popupInfoWrap.style.display = 'block';

      setTimeout(function () {
        popupInfoWrap.style.display = 'none';
      }, 3000);
    });




  </script>

</body>

</html>
