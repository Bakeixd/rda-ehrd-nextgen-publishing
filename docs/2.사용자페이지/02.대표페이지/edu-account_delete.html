<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="../css/swiper-bundle.min.css" rel="stylesheet" type="text/css">
	<link href="../css/reset.css" rel="stylesheet" type="text/css">
	<link href="../css/edu-main.css" rel="stylesheet" type="text/css">
	<link href="../css/edu-sub.css" rel="stylesheet" type="text/css">
	<link href="../css/component.css" rel="stylesheet" type="text/css">
	<link href="../css/modal.css" rel="stylesheet" type="text/css">
	<link href="../css/font.css" rel="stylesheet" type="text/css">

	<title>회원탈퇴팝업</title>

</head>

<body>
  <!--style에 적용되어있는건 화면적용할 때 삭제해주세요-->
  <style>
    body{background: #eee;}
    .modal{display: block; visibility: visible; opacity: 1;}
  </style>
  
  <!-- modal -->
  <section id="edu-delete" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-edu-delete">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <!-- modal title -->
        <div class="modal-header">
          <h2 id="tit-sch-detail" class="modal-title">회원탈퇴</h2>
        </div>
        <!-- //modal title -->
  
        <!-- modal contents -->
        <div class="modal-conts">
          <!--<h3 class="conts-tit">내용 타이틀</h3>-->
          <h3>농촌인적자원개발센터 회원탈퇴</h3>
  
          <div class="conts-area">
            <div class="edu_act_delete_box">
              <ul>
                <li>회원 탈퇴시 개인정보 및 모든 수강내역과 취득 수료증은 삭제되며 복구할 수 없습니다.</li>
                <li>탈퇴 이후에는 학습 자료 및 활동을 확인할 수 없습니다.</li>
                <li>동일한 회원정보로 다시 가입하더라도 탈퇴 전 보유 정보는 복구되지 않습니다.</li>
                <li>개인정보 처리방침 제 00조 (ㅇㅇㅇㅇ)에 따라 농촌인적자원개발센터는 법령에 따른 개인정보 보유ㆍ이용기간 또는 정
                  보주체로부터 개인정보를 수집 시에 동의받은 개인정보 보유ㆍ이용기간 내에서 개인정보를 처리ㆍ보유합니다.</li>
              </ul>

            </div>
            <div class="form-check">
              <input type="checkbox" id="check-confirm2">
              <label for="check-confirm2">해당 내용을 모두 확인하였으며, 회원탈퇴에 동의합니다.</label>
            </div>
            
  
            
          </div>
  
  
        </div>
        <!-- //modal contents -->
        <!-- modal btn -->
        <div class="modal-btn btn-wrap">
          <button type="button" class="btn btn-darkgray-w">회원탈퇴</button>
          <button type="button" class="btn btn-primary close-modal">닫기</button>
        </div>
        <!-- //modal btn -->
        <!-- close button -->
        <button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
        <!-- //close button -->
      </div>
    </div>
    <div class="modal-back"></div>
  </section>
  <!-- //modal -->
  
  
  
  
  
  
  <!-- 스크립트 : 라이브러리 -->
  <script src="../js/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="../js/common.js"></script>
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  <script>
  
  
  
  
  </script>
  
  </body>
  </html>
