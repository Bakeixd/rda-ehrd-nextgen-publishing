<!--style에 적용되어있는건 화면적용할 때 삭제해주세요-->
<style>
	body{background: #eee;}
	.modal{display: block; visibility: visible; opacity: 1;}
</style>

<!-- modal -->
<section id="sch-detail" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-sch-detail">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- modal title -->
			<div class="modal-header">
				<h2 id="tit-sch-detail" class="modal-title">기수선택</h2>
			</div>
			<!-- //modal title -->

			<!-- modal contents -->
			<div class="modal-conts">
				<!--<h3 class="conts-tit">내용 타이틀</h3>-->

				<div class="conts-area step-area">
					<!-- 스텝 -->
					<ol class="step-wrap">
						<li class="active">
								<span>
										<i class="step">1단계</i>
										<span class="step-tit">기수선택</span>
								</span>
						</li>
						<li>
								<span>
										<i class="step">2단계</i>
										<span class="step-tit">개인정보동의</span>
								</span>
						</li>
						<li class="">
								<span>
										<i class="step">3단계</i>
										<span class="step-tit">신청정보입력</span>
								</span>
						</li>
						<li class="">
								<span>
										<em class="none">현재단계</em>
										<i class="step">4단계</i>
										<span class="step-tit">수강신청완료</span>
								</span>
						</li>
					</ol>
					<!-- //스텝 -->
					<div class="table-wrap">
						<table class="table-type1">
							<caption>기수선택</caption>
							<colgroup>
								<col>
								<col>
								<col>
								<col>
							</colgroup>
							<thead>
								<th scope="col">기수</th>
								<th scope="col">목차</th>
								<th scope="col">교육시작일</th>
								<th scope="col">신청현황</th>
							</thead>
							<tbody>
								<tr>
									<td>1차시</td>
									<td>2024.01.01~2024.01.01</td>
									<td>2024.01.01</td>
									<td>
										<button type="button" class="btn sm btn-primary-w">수강신청</button>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
					

					
				</div>


			</div>
			<!-- //modal contents -->
			<!-- modal btn -->
			<div class="modal-btn btn-wrap">
				<button type="button" class="btn btn-darkgray-w">신청취소</button>
				<button type="button" class="btn btn-primary close-modal">다음</button>
			</div>
			<!-- //modal btn -->
			<!-- close button -->
			<button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
			<!-- //close button -->
		</div>
	</div>
	<div class="modal-back"></div>
</section>
<!-- //modal -->
