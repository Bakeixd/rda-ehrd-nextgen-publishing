<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="../css/swiper-bundle.min.css" rel="stylesheet" type="text/css">
	<link href="../css/reset.css" rel="stylesheet" type="text/css">
	<link href="../css/edu-main.css" rel="stylesheet" type="text/css">
	<link href="../css/edu-sub.css" rel="stylesheet" type="text/css">
	<link href="../css/component.css" rel="stylesheet" type="text/css">
	<link href="../css/modal.css" rel="stylesheet" type="text/css">
	<link href="../css/font.css" rel="stylesheet" type="text/css">

	<title>수강신청>신청정보입력</title>

</head>

<body>
<!--style에 적용되어있는건 화면적용할 때 삭제해주세요-->
<style>
	body{background: #eee;}
	.modal{display: block; visibility: visible; opacity: 1;}
</style>

<!-- modal -->
<section id="sch-detail" class="modal fade" aria-hidden="true" role="dialog" aria-labelledby="tit-sch-detail">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- modal title -->
			<div class="modal-header">
				<h2 id="tit-sch-detail" class="modal-title">기수선택</h2>
			</div>
			<!-- //modal title -->

			<!-- modal contents -->
			<div class="modal-conts">
				<!--<h3 class="conts-tit">내용 타이틀</h3>-->

				<div class="conts-area step-area">
					<!-- 스텝 -->
					<ol class="step-wrap">
						<li class="done">
							<span>
								<i class="step">1단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="done">
							<span>
								<i class="step">2단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="active">
							<span>
								<i class="step">3단계</i>
								<span class="step-tit">단계 레이블</span>
							</span>
						</li>
						<li class="">
							<span>
								<em class="none">현재단계</em>
								<i class="step">4단계</i>
									<span class="step-tit">단계 레이블</span>
							</span>
						</li>
					</ol>
					<!-- //스텝 -->
					<div class="st-class-box">
						<p class="st-class-title">데이터 분석과 모델링 및 데이터 활용 기술</p>
						<ul>
							<li>
								<strong>교육대상</strong>
								<span>누구나</span>
							</li>
							<li>
								<strong>학습시간</strong>
								<span>3시간</span>
							</li>
							<li>
								<strong>교육기간</strong>
								<span>2024.01.01 ~ 2024.01.01</span>
							</li>
						</ul>
					</div>

					<div class="table-wrap">
						<div class="table-top">
							<button type="button" class="btn-tooltip" data-tooltip="신청자 정보를 확인하시고 변경이 필요할 경우우측 [회원정보수정] 버튼을 통해 수정해주세요.">
								<i class="i-tooltip">d</i>
							</button>
							<button type="button" class="btn sm btn-darkgray-w">회원정보수정</button>
						</div>
						<table class="table-type2">
							<caption>커리큘럼</caption>
							<colgroup>
								<col style="width: 30%">
								<col>
							</colgroup>
							<tbody>
								<tr>
									<th>
										차량여부
										<button type="button" class="btn-tooltip sm" 
										data-tooltip="· 교육기간동안 차량을 이용하여 센터 내 출입을 원하시는 경우[차량번호]를 등록해주세요
										· 등록차량 변경 시, 과정장에게 연락해주세요.">
											<i class="i-tooltip">d</i>
										</button>
									</th>
									<td>
										<div class="table-input">
											<div class="form-check sm">
												<input type="radio" name="terms_rdo1" id="terms_rdo1-1">
												<label for="terms_rdo1-1">차량없음</label>
											</div>
											<div class="form-check sm">
												<input type="radio" name="terms_rdo1" id="terms_rdo1-2">
												<label for="terms_rdo1-2">차량있음</label>
											</div>
										</div>
									</td>
								</tr>
								<tr>
									<th>차량번호</th>
									<td>
										<div class="table-input">
											<div class="form-conts">
												<input type="number" id="consult_name" class="form-control xsm" placeholder="차량 앞번호">
										</div>
										<div class="form-conts">
											<input type="text" id="consult_name" class="form-control xsm" placeholder="한글 기호">
									</div>
									<div class="form-conts">
										<input type="number" id="consult_name" class="form-control xsm" placeholder="차량 뒷번호">
								</div>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
					
					

					
				</div>


			</div>
			<!-- //modal contents -->
			<!-- modal btn -->
			<div class="modal-btn btn-wrap">
				<button type="button" class="btn btn-darkgray-w">신청취소</button>
				<button type="button" class="btn btn-secondary">이전</button>
				<button type="button" class="btn btn-primary close-modal">다음</button>
			</div>
			<!-- //modal btn -->
			<!-- close button -->
			<button type="button" class="btn-close close-modal"><span class="none">닫기</span></button>
			<!-- //close button -->
		</div>
	</div>
	<div class="modal-back"></div>
</section>
<!-- //modal -->






<!-- 스크립트 : 라이브러리 -->
<script src="../js/swiper-bundle.min.js"></script>
<script type="text/javascript" src="../js/common.js"></script>
<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>



</script>

</body>
</html>
